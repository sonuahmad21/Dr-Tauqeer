services:
  postgres:
    image: postgres:16-alpine
    container_name: shipla-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shipla
      POSTGRES_PASSWORD: shipla
      POSTGRES_DB: shipla
    volumes:
      - shipla_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipla -d shipla"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shipla_pgdata:
